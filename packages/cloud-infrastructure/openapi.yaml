        '200':
          description: Thread details
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread:
                    $ref: '#/components/schemas/Thread'

    patch:
      tags: [Threads]
      summary: Update thread
      parameters:
        - $ref: '#/components/parameters/threadId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                agentId:
                  type: string
                projectId:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Thread updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread:
                    $ref: '#/components/schemas/Thread'

    delete:
      tags: [Threads]
      summary: Delete thread
      parameters:
        - $ref: '#/components/parameters/threadId'
      responses:
        '200':
          description: Thread deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResponse'

  /threads/{threadId}/messages:
    get:
      tags: [Threads]
      summary: Get conversation history
      parameters:
        - $ref: '#/components/parameters/threadId'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Message history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadMessageListResponse'

    post:
      tags: [Threads]
      summary: Execute message (SSE)
      description: |
        Execute a message in the thread context. Returns Server-Sent Events (SSE) stream.

        Requires positive budget balance.

        **Event Types:**
        - `response.started` - Execution started
        - `response.item.completed` - Partial result (reasoning, tool call, etc.)
        - `response.completed` - Execution complete
        - `stream.completed` - Stream ended
        - `stream.error` - Error occurred
      parameters:
        - $ref: '#/components/parameters/threadId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ThreadExecuteMessageRequest'
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
        '402':
          $ref: '#/components/responses/PaymentRequired'
        '409':
          description: Thread is busy (execution in progress)

