      summary: Get computer change file
      description: |
        Read one file from a historical computer change.

        Use the default JSON response for text payloads. Set `format=raw` when you want the raw
        historical bytes for previews or binary assets.
      parameters:
        - $ref: '#/components/parameters/environmentIdPath'
        - name: changeId
          in: path
          required: true
          schema:
