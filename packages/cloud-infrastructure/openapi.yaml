  /environments/{environmentId}/changes:
    get:
      tags: [Computers]
      summary: List computer changes
      description: |
        List file-level change events captured for a computer workspace over time.

        This is the canonical state-history feed for one computer. Each entry represents one
        concrete file operation and includes project, thread, step, and agent context when ACP
        can resolve it.
      parameters:
        - $ref: '#/components/parameters/environmentIdPath'
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: projectId
          in: query
          schema:
            type: string
          description: Filter changes to one specific project-scoped activity stream
        - name: agentId
          in: query
          schema:
            type: string
          description: Filter changes to one specific agent
        - name: operation
          in: query
          schema:
            type: string
            enum: [created, uploaded, modified, deleted]
          description: Filter changes by file operation
      responses:
        '200':
          description: Environment change list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnvironmentChangeListResponse'

