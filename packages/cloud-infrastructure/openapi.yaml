        - name: path
          in: query
          required: true
          schema:
            type: string
          description: File path within the change
        - name: format
          in: query
          schema:
            type: string
            enum: [raw]
          description: Return the raw historical file bytes instead of a JSON content payload
      responses:
        '200':
          description: Change file content
          content:
