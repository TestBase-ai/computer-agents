openapi: 3.0.3
info:
  title: Computer Agents Cloud API
  description: |
    The Computer Agents Cloud API provides a powerful platform for executing AI-powered computer agents in isolated cloud environments.

    ## Base URL

    All API requests should be made to:
    ```
    https://api.computer-agents.com
    ```

    ## Authentication

    All API endpoints (except `/health` and `/version`) require authentication via Bearer token:

    ```
    Authorization: Bearer tb_prod_xxx...
    ```

    API keys can be obtained through the admin dashboard or by contacting support.

    ## Key Concepts

    - **Projects**: Workspaces for organizing threads, agents, computers, and resources
    - **Computers**: Persistent execution workspaces with runtimes, packages, files, and container lifecycle
    - **Resources**: Deployable and managed app surfaces such as web apps, functions, auth modules, and agent runtimes
    - **Threads**: Conversation contexts for multi-turn agent interactions
    - **Agents**: Configurable AI agents with specific models and instructions

    ## Rate Limits

    - 1000 requests per 15 minutes per IP (global)
    - Budget-protected endpoints require positive balance

  version: 1.0.0
  contact:
    name: Computer Agents Support
    url: https://computer-agents.com
  license:
    name: MIT

servers:
  - url: https://api.computer-agents.com
    description: Production server

tags:
  - name: System
    description: Version and platform-level metadata endpoints
  - name: Health
    description: Health and monitoring endpoints
  - name: Projects
    description: Project management and workspace grouping
  - name: Tasks
    description: Task planning, board workflows, comments, sprints, releases, and task-to-thread execution
  - name: Computers
    description: Persistent computer workspaces, runtime configuration, and container lifecycle
  - name: Resources
    description: Deployable and managed service surfaces exposed under /v1/servers
  - name: Databases
    description: Managed structured data stores, collections, documents, and analytics
  - name: Files
    description: File and directory operations on computer and resource workspaces
  - name: Attachments
    description: Uploaded thread and workspace attachments stored in user computer workspaces
  - name: Skills
    description: Custom user-defined skills with markdown instructions, files, and icons
  - name: Threads
    description: Conversation threads and message execution
  - name: Agents
    description: Agent configuration and management
  - name: Orchestrations
    description: Multi-agent workflows with reusable orchestration graphs and orchestration runs
  - name: Schedules
    description: Time-based automations and recurring or one-time execution schedules
  - name: Triggers
    description: Event-driven automations, webhook triggers, and trigger execution history
  - name: Billing
    description: User budget, subscription, resource-billing preferences, and workspace inference settings
  - name: Costs
    description: Cost analytics and thread-level usage breakdowns derived from ACP execution data
  - name: Account
    description: Authenticated account identity and destructive account-data deletion
  - name: Notifications
    description: Push notification token registration and device-token management
  - name: Reports
    description: Content reporting and moderation-report submission history
  - name: Admin
    description: Administrative operations (requires admin key)

paths:
  # ============================================================================
  # Health & Monitoring
  # ============================================================================
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Get API health status and system diagnostics
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: API is unhealthy

  /version:
    get:
      tags: [System]
      summary: Get build version
      description: Return build, commit, and runtime metadata for the currently deployed API service.
      security: []
      responses:
        '200':
          description: Build and runtime version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

  /metrics:
    get:
      tags: [Health]
      summary: Get execution metrics
      description: Get detailed execution metrics and statistics
      responses:
        '200':
          description: Metrics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsSummary'

  # ============================================================================
  # Projects
  # ============================================================================
  /projects:
    get:
      tags: [Projects]
      summary: List projects
      description: List all projects for the authenticated user
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [local, cloud, synced]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        '200':
          description: List of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
                  count:
                    type: integer

    post:
      tags: [Projects]
      summary: Create project
      description: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                id:
                  type: string
                  description: Optional custom ID
                name:
                  type: string
                  description: Project name
                description:
                  type: string
                type:
                  type: string
                  enum: [local, cloud, synced]
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'

  /projects/{projectId}:
    get:
      tags: [Projects]
      summary: Get project
      description: Get project details and statistics
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: Project details
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: '#/components/schemas/Project'
                  stats:
                    type: object
                    properties:
                      fileCount:
                        type: integer
                      totalSize:
                        type: integer
                      totalSizeMB:
                        type: string
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Projects]
      summary: Update project
      parameters:
        - $ref: '#/components/parameters/projectId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Project updated

    delete:
      tags: [Projects]
      summary: Delete project
      parameters:
        - $ref: '#/components/parameters/projectId'
        - name: hard
          in: query
          schema:
            type: boolean
            default: false
          description: Permanently delete (hard delete)
      responses:
        '200':
          description: Project deleted

  /projects/{projectId}/schedules:
    get:
      tags: [Projects]
      summary: List project schedules
      description: List schedules attached to a project across its tickets, threads, and automations.
      parameters:
        - $ref: '#/components/parameters/projectId'
        - name: rangeStart
          in: query
          schema:
            type: string
            format: date-time
          description: Optional lower bound for schedule occurrence filtering.
        - name: rangeEnd
          in: query
          schema:
            type: string
            format: date-time
          description: Optional upper bound for schedule occurrence filtering.
      responses:
        '200':
          description: Project schedule list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleListResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================================
  # Local Bridge
  # ============================================================================
  /devices:
    get:
      tags: [Local Bridge]
      summary: List registered devices
      description: List local devices registered for the authenticated user. This surface is feature-flagged and may be unavailable unless local bridge or sync is enabled.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [online, offline]
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Device list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'

    post:
      tags: [Local Bridge]
      summary: Register device
      description: Register a local device for future local execution or workspace sync.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreate'
      responses:
        '201':
          description: Device created
          content:
            application/json:
              schema:
                type: object
                properties:
                  device:
                    $ref: '#/components/schemas/Device'

  /devices/{deviceId}:
    get:
      tags: [Local Bridge]
      summary: Get device
      parameters:
        - $ref: '#/components/parameters/deviceIdPath'
      responses:
        '200':
          description: Device details
          content:
            application/json:
              schema:
                type: object
                properties:
                  device:
                    $ref: '#/components/schemas/Device'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Local Bridge]
      summary: Update device
      parameters:
        - $ref: '#/components/parameters/deviceIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdate'
      responses:
        '200':
          description: Device updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  device:
                    $ref: '#/components/schemas/Device'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Local Bridge]
      summary: Delete device
      parameters:
        - $ref: '#/components/parameters/deviceIdPath'
      responses:
        '204':
          description: Device deleted

  /devices/{deviceId}/heartbeat:
    post:
      tags: [Local Bridge]
      summary: Heartbeat device
      description: Update a registered device's liveness, version metadata, and capabilities.
      parameters:
        - $ref: '#/components/parameters/deviceIdPath'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                appVersion:
                  type: string
                  nullable: true
                daemonVersion:
                  type: string
                  nullable: true
                capabilities:
                  type: object
                  nullable: true
                  additionalProperties: true
      responses:
        '200':
          description: Device heartbeat accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  device:
                    $ref: '#/components/schemas/Device'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspace-bindings:
    get:
      tags: [Local Bridge]
      summary: List workspace bindings
      description: List local folder to environment bindings for the authenticated user.
      parameters:
        - name: deviceId
          in: query
          schema:
            type: string
        - name: environmentId
          in: query
          schema:
            type: string
        - name: projectId
          in: query
          schema:
            type: string
            nullable: true
          description: Filter to a specific project. Use `none` for bindings without a project.
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Workspace binding list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceBindingListResponse'

    post:
      tags: [Local Bridge]
      summary: Create workspace binding
      description: Bind a local folder on a registered device to an ACP environment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceBindingCreate'
      responses:
        '201':
          description: Workspace binding created
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding:
                    $ref: '#/components/schemas/WorkspaceBinding'

  /workspace-bindings/{bindingId}:
    get:
      tags: [Local Bridge]
      summary: Get workspace binding
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
      responses:
        '200':
          description: Workspace binding details
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding:
                    $ref: '#/components/schemas/WorkspaceBinding'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Local Bridge]
      summary: Update workspace binding
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspaceBindingUpdate'
      responses:
        '200':
          description: Workspace binding updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  binding:
                    $ref: '#/components/schemas/WorkspaceBinding'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Local Bridge]
      summary: Delete workspace binding
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
      responses:
        '204':
          description: Workspace binding deleted

  /workspace-bindings/{bindingId}/push-sessions:
    get:
      tags: [Local Bridge]
      summary: List workspace push sessions
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
      responses:
        '200':
          description: Workspace push session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePushSessionListResponse'

    post:
      tags: [Local Bridge]
      summary: Prepare workspace push session
      description: Persist a prepared local push intent for a binding without transferring files yet.
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspacePushSessionCreate'
      responses:
        '200':
          description: Existing prepared workspace push session reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePushSessionPrepareResponse'
        '201':
          description: Workspace push session prepared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePushSessionPrepareResponse'

  /workspace-bindings/{bindingId}/push-sessions/{pushSessionId}:
    get:
      tags: [Local Bridge]
      summary: Get workspace push session
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
        - $ref: '#/components/parameters/pushSessionIdPath'
      responses:
        '200':
          description: Workspace push session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePushSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspace-bindings/{bindingId}/pull-sessions:
    get:
      tags: [Local Bridge]
      summary: List workspace pull sessions
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
      responses:
        '200':
          description: Workspace pull session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePullSessionListResponse'

    post:
      tags: [Local Bridge]
      summary: Prepare workspace pull session
      description: Persist a prepared remote-to-local pull preview for a binding without changing local files yet.
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspacePullSessionCreate'
      responses:
        '200':
          description: Existing prepared workspace pull session reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePullSessionPrepareResponse'
        '201':
          description: Workspace pull session prepared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePullSessionPrepareResponse'

  /workspace-bindings/{bindingId}/pull-sessions/{pullSessionId}:
    get:
      tags: [Local Bridge]
      summary: Get workspace pull session
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
        - $ref: '#/components/parameters/pullSessionIdPath'
      responses:
        '200':
          description: Workspace pull session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePullSessionResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /workspace-bindings/{bindingId}/pull-sessions/{pullSessionId}/apply-preview:
    post:
      tags: [Local Bridge]
      summary: Attach workspace pull apply preview
      description: Persist a content-aware local apply preview on a prepared pull session without changing any local files.
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
        - $ref: '#/components/parameters/pullSessionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspacePullApplyPreviewCreate'
      responses:
        '200':
          description: Workspace pull apply preview attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePullApplyPreviewResponse'

  /workspace-bindings/{bindingId}/pull-sessions/{pullSessionId}/apply-result:
    post:
      tags: [Local Bridge]
      summary: Attach workspace pull apply result
      description: Persist the result of a guarded local apply for a prepared pull session.
      parameters:
        - $ref: '#/components/parameters/bindingIdPath'
        - $ref: '#/components/parameters/pullSessionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkspacePullApplyResultCreate'
      responses:
        '200':
          description: Workspace pull apply result attached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspacePullApplyResultResponse'

  # ============================================================================
  # Tasks
  # ============================================================================
  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      description: List tasks across projects with optional filtering by project, sprint, release, status, assignee, and text query.
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            nullable: true
          description: Filter to a specific project. Use `none` for unscoped tasks.
        - name: releaseId
          in: query
          schema:
            type: string
            nullable: true
          description: Filter to a specific release. Use `none` for tasks without a release.
        - name: status
          in: query
          schema:
            type: string
            enum: [backlog, todo, in_progress, blocked, done]
        - name: sprintId
          in: query
          schema:
            type: string
            nullable: true
          description: Filter to a specific sprint. Use `none` for tasks without a sprint.
        - name: assigneeAgentId
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
          description: Case-insensitive search over title and description.
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Task list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'

    post:
      tags: [Tasks]
      summary: Create task
      description: Create a task that can later be assigned to an agent, grouped into a sprint or release, and started as a thread.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: '#/components/schemas/Task'

  /tasks/workspace:
    get:
      tags: [Tasks]
      summary: Get task workspace
      description: Build a board-ready task workspace payload with stats, grouped lanes, calendar items, releases, sprints, and task details.
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            nullable: true
          description: Restrict the workspace to one project. Use `none` for tasks without a project.
        - name: q
          in: query
          schema:
            type: string
          description: Search query applied across tasks, sprints, and releases.
        - name: rangeStart
          in: query
          schema:
            type: string
            format: date-time
        - name: rangeEnd
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Task workspace payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskWorkspaceResponse'

  /tasks/sprints:
    get:
      tags: [Tasks]
      summary: List sprints
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            nullable: true
          description: Filter to a specific project. Use `none` for unscoped sprints.
        - name: status
          in: query
          schema:
            type: string
            enum: [planned, active, completed]
        - name: q
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Sprint list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSprintListResponse'

    post:
      tags: [Tasks]
      summary: Create sprint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskSprintCreate'
      responses:
        '201':
          description: Sprint created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sprint:
                    $ref: '#/components/schemas/TaskSprint'

  /tasks/sprints/{sprintId}:
    get:
      tags: [Tasks]
      summary: Get sprint
      parameters:
        - $ref: '#/components/parameters/sprintIdPath'
      responses:
        '200':
          description: Sprint with tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskSprintResponse'

    patch:
      tags: [Tasks]
      summary: Update sprint
      parameters:
        - $ref: '#/components/parameters/sprintIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskSprintUpdate'
      responses:
        '200':
          description: Sprint updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  sprint:
                    $ref: '#/components/schemas/TaskSprint'

    delete:
      tags: [Tasks]
      summary: Delete sprint
      parameters:
        - $ref: '#/components/parameters/sprintIdPath'
      responses:
        '200':
          description: Sprint deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResponse'

  /tasks/releases:
    get:
      tags: [Tasks]
      summary: List releases
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Release list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskReleaseListResponse'

    post:
      tags: [Tasks]
      summary: Create release
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskReleaseCreate'
      responses:
        '201':
          description: Release created
          content:
            application/json:
              schema:
                type: object
                properties:
                  release:
                    $ref: '#/components/schemas/TaskRelease'

  /tasks/releases/{releaseId}:
    get:
      tags: [Tasks]
      summary: Get release
      parameters:
        - $ref: '#/components/parameters/releaseIdPath'
      responses:
        '200':
          description: Release with tasks
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskReleaseResponse'

    patch:
      tags: [Tasks]
      summary: Update release
      parameters:
        - $ref: '#/components/parameters/releaseIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskReleaseUpdate'
      responses:
        '200':
          description: Release updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  release:
                    $ref: '#/components/schemas/TaskRelease'

    delete:
      tags: [Tasks]
      summary: Delete release
      parameters:
        - $ref: '#/components/parameters/releaseIdPath'
      responses:
        '200':
          description: Release deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedResponse'

  /tasks/{taskId}:
    get:
      tags: [Tasks]
      summary: Get task
      description: Get a task together with resolved project, sprint, release, assignee, dependencies, dependents, linked threads, and comments.
      parameters:
        - $ref: '#/components/parameters/taskIdPath'
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetailResponse'

    patch:
      tags: [Tasks]
      summary: Update task
      parameters:
        - $ref: '#/components/parameters/taskIdPath'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
