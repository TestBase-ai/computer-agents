components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API key authentication
    adminAuth:
      type: http
      scheme: bearer
      description: Admin API key authentication

  parameters:
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
      description: Project ID

    taskIdPath:
      name: taskId
      in: path
      required: true
      schema:
        type: string
      description: Task ID

    sprintIdPath:
      name: sprintId
      in: path
      required: true
      schema:
        type: string
      description: Sprint ID

    releaseIdPath:
      name: releaseId
      in: path
      required: true
      schema:
        type: string
      description: Release ID

    orchestrationIdPath:
      name: orchestrationId
      in: path
      required: true
      schema:
        type: string
      description: Orchestration ID

    orchestrationRunIdPath:
      name: orchestrationRunId
      in: path
      required: true
      schema:
        type: string
      description: Orchestration run ID

    environmentId:
      name: environmentId
      in: query
      schema:
        type: string
      description: Environment ID (optional)

    environmentIdPath:
      name: environmentId
      in: path
      required: true
      schema:
        type: string
      description: Environment ID

    threadId:
      name: threadId
      in: path
      required: true
      schema:
        type: string
      description: Thread ID

    stepIdPath:
      name: stepId
      in: path
      required: true
      schema:
        type: string
      description: Thread step ID

    sessionIdPath:
      name: sessionId
      in: path
      required: true
