  # ============================================================================
  # Threads (Conversation Management)
  # ============================================================================
  /threads:
    get:
      tags: [Threads]
      summary: List threads
      description: List conversation threads with filtering
      parameters:
        - name: projectId
          in: query
          schema:
            type: string
            nullable: true
          description: Filter to a specific project. Use `none` for unscoped threads.
        - $ref: '#/components/parameters/environmentId'
        - name: agentId
          in: query
          schema:
            type: string
        - name: appId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, running, completed, failed, cancelled]
        - name: createdAfter
          in: query
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Thread list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ThreadListResponse'

    post:
      tags: [Threads]
      summary: Create thread
      description: Create a new conversation thread. The thread can be project-scoped, scheduled, or immediately executed depending on the request body.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  type: string
                  nullable: true
                environmentId:
                  type: string
                  description: Environment to execute in
                agentId:
                  type: string
                  description: Agent to use (optional)
                title:
                  type: string
                  description: Thread title (optional)
                appId:
                  type: string
                content:
                  type: string
                  description: Optional first user message to execute immediately.
                task:
                  type: string
                  description: Legacy alias for `content`.
                stream:
                  type: boolean
                  default: true
                metadata:
                  type: object
                  nullable: true
                  additionalProperties: true
            example:
              projectId: proj_crm
              environmentId: env_crm
              agentId: agent_developer
              title: Build CRM dashboard
              content: Build the first version of the CRM dashboard and wire it to the leads database.
              stream: true
              metadata:
                source: quickstart
      responses:
        '201':
          description: Thread created
          content:
            application/json:
              schema:
                type: object
                properties:
                  thread:
                    $ref: '#/components/schemas/Thread'
        '402':
          $ref: '#/components/responses/PaymentRequired'

