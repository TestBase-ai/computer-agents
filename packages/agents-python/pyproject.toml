[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "computer-agents"
version = "2.6.1"
description = "Official Python SDK for the Computer Agents Agentic Compute Platform API. Build with threads, computers, agents, resources, and databases."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Computer Agents" },
]
keywords = [
    "computer-agents",
    "ai",
    "agents",
    "agentic-compute-platform",
    "cloud",
    "api",
    "sdk",
    "automation",
    "code-generation",
    "mcp",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "mypy>=1.0",
    "ruff>=0.4.0",
    "respx>=0.21.0",
]

[project.urls]
Homepage = "https://computer-agents.com"
Documentation = "https://computer-agents.com/documentation"
Repository = "https://github.com/computer-agents/computer-agents-sdk-python"
Issues = "https://github.com/computer-agents/computer-agents-sdk-python/issues"
Changelog = "https://github.com/computer-agents/computer-agents-sdk-python/blob/main/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["computer_agents"]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]

[tool.mypy]
python_version = "3.9"
strict = false
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
